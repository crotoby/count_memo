<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字数カウントメモ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="memo-card">
      <p class="eyebrow">Simple Note Space</p>
      <h1>文字数カウントメモ</h1>
      <p class="lead">
        入力すると、今の文字数がすぐ下に表示されます。
        内容はこのブラウザに自動で保存されます。
      </p>

      <div class="status-row" aria-live="polite">
        <div class="counter-block">
          <span class="status-label">文字数</span>
          <strong id="char-count">0</strong>
        </div>
        <div class="counter-block">
          <span class="status-label">改行をのぞいた文字数</span>
          <strong id="char-count-no-breaks">0</strong>
        </div>
        <p id="save-status" class="save-status">未保存</p>
      </div>

      <label class="memo-label" for="memo-input">メモを書く場所</label>
      <textarea
        id="memo-input"
        class="memo-input"
        placeholder="ここに自由にメモを書いてください"
      ></textarea>

      <div class="actions">
        <button type="button" id="clear-button" class="ghost-button">メモを空にする</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
